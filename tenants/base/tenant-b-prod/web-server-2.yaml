apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server-2
  namespace: tenant-b-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-server-2
  template:
    metadata:
      labels:
        app: web-server-2
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-server-2
  namespace: tenant-b-prod
spec:
  selector:
    app: web-server-2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
