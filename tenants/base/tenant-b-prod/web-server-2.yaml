apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server-2
  namespace: tenant-b-prod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-server-2
  template:
    metadata:
      labels:
        app: web-server-2
      # NEW BLOCK: Taming the invisible Istio sidecar limits
      annotations:
        sidecar.istio.io/proxyCPULimit: "200m"
        sidecar.istio.io/proxyMemoryLimit: "256Mi"
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: web-server-2
  namespace: tenant-b-prod
spec:
  selector:
    app: web-server-2
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
