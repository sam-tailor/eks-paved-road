apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: public-gateway
  namespace: tenant-a-prod
spec:
  selector:
    app: istio-ingress
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*"
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: web-route
  namespace: tenant-a-prod
spec:
  hosts:
  - "*"
  gateways:
  - public-gateway
  http:
  # NEW ROUTE: Intercept /appa and route to web-server-2
  - match:
    - uri:
        prefix: /appa
    rewrite:
      uri: /
    route:
    - destination:
        host: web-server-2
        port:
          number: 80
  # EXISTING ROUTE: Intercept /tenant-a and route to web-server
  - match:
    - uri:
        prefix: /tenant-a
    rewrite:
      uri: /
    route:
    - destination:
        host: web-server
        port:
          number: 80
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-public-web
  namespace: tenant-a-prod
spec:
  selector:
    matchLabels:
      app: web
  action: ALLOW
  rules:
  - to:
    - operation:
        ports: ["80"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-public-web-2
  namespace: tenant-a-prod
spec:
  selector:
    matchLabels:
      app: web-server-2
  action: ALLOW
  rules:
  - to:
    - operation:
        ports: ["80"]
