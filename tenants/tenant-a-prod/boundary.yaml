apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a-prod
  labels:
    istio-injection: enabled  # <--- THIS IS THE MAGIC LABEL
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: tenant-a-prod
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
