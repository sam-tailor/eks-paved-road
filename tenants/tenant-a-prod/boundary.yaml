apiVersion: v1
kind: Namespace
metadata:
  name: tenant-a-prod
  labels:
    istio-injection: enabled  # Ready for the service mesh!
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: compute-quota
  namespace: tenant-a-prod
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
